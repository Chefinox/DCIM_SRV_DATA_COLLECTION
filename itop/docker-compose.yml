services:
  itop-db:
    image: mariadb:10.11
    container_name: itop-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${ITOP_DB_NAME:-itop}
      MYSQL_USER: ${ITOP_DB_USER:-itop}
      MYSQL_PASSWORD: ${ITOP_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${ITOP_DB_ROOT_PASSWORD}
      TZ: ${TZ:-Asia/Jakarta}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=${MARIADB_INNODB_BUFFER_POOL_SIZE:-512M}
      - --innodb-log-file-size=${MARIADB_INNODB_LOG_FILE_SIZE:-256M}
      - --max-connections=${MARIADB_MAX_CONNECTIONS:-200}
      - --query-cache-type=0
      - --query-cache-size=0
    ports:
      - "3306:3306"
    volumes:
      - itop_db_data:/var/lib/mysql
      - ./mariadb/conf.d:/etc/mysql/conf.d:ro
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - itop-internal

  itop-web:
    image: vbkunin/itop:3.1.1
    container_name: itop-web
    restart: unless-stopped
    depends_on:
      itop-db:
        condition: service_healthy
    environment:
      DB_HOST: itop-db
      DB_NAME: ${ITOP_DB_NAME:-itop}
      DB_USER: ${ITOP_DB_USER:-itop}
      DB_PASSWORD: ${ITOP_DB_PASSWORD}
      ITOP_ADMIN_USER: ${ITOP_ADMIN_USER:-admin}
      ITOP_ADMIN_PASSWORD: ${ITOP_ADMIN_PASSWORD}
      ITOP_URL: ${ITOP_URL:-http://localhost:8080}
      PHP_MEMORY_LIMIT: ${PHP_MEMORY_LIMIT:-512M}
      PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE:-64M}
      PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE:-64M}
      TZ: ${TZ:-Asia/Jakarta}
    ports:
      - "${ITOP_HTTP_BIND:-127.0.0.1}:${ITOP_HTTP_PORT:-8080}:80"
    volumes:
      - itop_web_data:/var/www/html
      - ./itop/conf:/var/www/html/conf
      - ./itop/extensions:/var/www/html/extensions
      - ./itop/log:/var/www/html/log
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || curl -fsS http://127.0.0.1/setup/index.php >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - itop-internal
      - itop-public

