  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: itop-cloudbeaver
    restart: unless-stopped
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_workspace:/opt/cloudbeaver/workspace
    networks:
      - itop-internal
      - itop-public
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CB_SERVER_NAME: "DCIM Database Manager"
      CB_ADMIN_NAME: admin
      CB_ADMIN_PASSWORD: Inovasi@0918

networks:
  itop-internal:
    driver: bridge
  itop-public:
    driver: bridge

volumes:
  itop_db_data:
  itop_web_data:
  sync_state:
  cloudbeaver_workspace:
