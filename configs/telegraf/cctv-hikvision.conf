# Telegraf Configuration for CCTV Hikvision ISAPI Poller
# Uses exec plugin to run poller and capture InfluxDB line protocol
# Sends to Kafka topic: dcim.raw.device.isapi

[[inputs.exec]]
  ## Commands array
  commands = [
    "/usr/bin/python3 /home/infra/dcim_metrics_project/scripts/hikvision_poller.py"
  ]
  
  ## Timeout for each command to complete.
  timeout = "110s"
  
  ## Data format (influx line protocol)
  data_format = "influx"
  
  ## Name override
  name_override = "cctv_metrics"
  
  ## Tags
  [inputs.exec.tags]
    source = "hikvision_isapi"
    collector = "telegraf_exec"
    environment = "production"

[[outputs.kafka]]
  ## Kafka brokers
  brokers = ["localhost:9092"]
  
  ## Kafka topic for CCTV raw data
  topic = "dcim.raw.device.isapi"
  
  ## Compression codec (0=none, 1=gzip, 2=snappy, 3=lz4, 4=zstd)
  compression_codec = 2
  
  ## Required acks from Kafka (-1 = all, 0 = none, 1 = leader)
  required_acks = 1
  
  ## Max message bytes
  max_message_bytes = 1000000
  
  ## Data format
  data_format = "json"
  
  ## JSON timestamp format
  json_timestamp_units = "1ms"
  
  ## Routing tag (optional)
  [outputs.kafka.tagpass]
    source = ["hikvision_isapi"]
