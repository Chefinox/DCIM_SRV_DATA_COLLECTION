# Data Quality Schema for AI Feature Readiness
# Defines the required fields that must exist in Elasticsearch for each device type.
# device_type values must match EXACTLY what is stored in tag.device_type.keyword in ES.

server:
  - serial_number
  - model
  - raw_fields.cpuUtilization
  - raw_fields.memoryUsage
  - raw_fields.power_output_watts
  - raw_fields.system_temp

ups:
  - serial_number
  - model
  - raw_fields.output_load
  - raw_fields.battery_temp
  - raw_fields.battery_runtime_remain

network:
  - serial_number
  - model
  - raw_fields.cpu_load

nas:
  - serial_number
  - model
  - raw_fields.diskTemp
