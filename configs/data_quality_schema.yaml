# Data Quality Schema for AI Feature Readiness
# Defines the required fields that must exist in Elasticsearch for each device type.
# device_type values must match EXACTLY what is stored in tag.device_type.keyword in ES.

server:
  - tag.serial_number
  - tag.model
  - dcim_metrics.raw_fields_cpuUtilization
  - dcim_metrics.raw_fields_memoryUsage
  - dcim_metrics.raw_fields_power_output_watts
  - dcim_metrics.raw_fields_system_temp

ups:
  - tag.serial_number
  - tag.model
  - dcim_metrics.raw_fields_output_load
  - dcim_metrics.raw_fields_battery_temp
  - dcim_metrics.raw_fields_battery_runtime_remain

network:
  - tag.serial_number
  - tag.model
  - dcim_metrics.raw_fields_cpu_load

nas:
  - tag.serial_number
  - tag.model
  - dcim_metrics.raw_fields_diskTemp
