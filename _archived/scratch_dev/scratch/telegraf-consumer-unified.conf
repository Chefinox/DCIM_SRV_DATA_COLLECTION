  urls = ["https://10.70.0.56:9200"]
  insecure_skip_verify = true
  username = "elastic"
  password = "C+H+pFb*aIAqWcOo-X8q"
  index_name = "dcim-metrics-unified-%Y.%m.%d"
  manage_template = true
  template_name = "dcim-metrics-unified"
